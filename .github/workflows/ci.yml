name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.22.3'
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
      - run: npm ci
      - run: npm run check:forbidden-files
      - run: npm run check:version
      - run: npm run check:fixture-privacy
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:coverage
      - run: npm run generate:evidence-matrix
      - run: git diff --exit-code docs/acceptance/v4-evidence-matrix.md
      - run: npm audit --audit-level=high
      - run: python -m pip install pip-audit==2.10.1
      - run: python -m pip_audit -r requirements.txt
