name: 构建跨平台安装包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release-gate:
    needs: test
    runs-on: ubuntu-latest
    name: Release gate
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'

      - name: 安装依赖
        run: npm ci

      - name: 校验发布源码
        run: npm run check:clean-release

  build-mac:
    needs: release-gate
    runs-on: macos-latest
    environment: mac-release
    name: 打包 Mac Electrobun 版
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2

      - name: 安装依赖
        run: bun install

      - name: Electrobun 打包
        run: bun run build:mac

      - name: Developer ID 签名、公证与 Staple
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then export X2MD_RELEASE_CHANNEL=stable; else export X2MD_RELEASE_CHANNEL=beta; fi
          bash scripts/sign-and-notarize-mac.sh build/stable-macos-arm64/X2MD.app

      - name: 压缩 Mac .app
        run: |
          APP_PATH="build/stable-macos-arm64/X2MD.app"
          test -n "$APP_PATH"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" X2MD_Mac.zip

      - name: 解压并校验最终 Mac 压缩包
        env:
          X2MD_REQUIRE_SIGNED: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: |
          rm -rf release-smoke
          mkdir release-smoke
          ditto -x -k X2MD_Mac.zip release-smoke
          node scripts/check-release-artifacts.mjs --mac-zip X2MD_Mac.zip

      - name: 最终 Artifact 全验收
        env:
          X2MD_SMOKE_APP: release-smoke/X2MD.app
          X2MD_SMOKE_EXTENSION_DIR: release-smoke/X2MD.app/Contents/Resources/extension
          X2MD_RELEASE_REF: ${{ github.ref_name }}
        run: |
          X2MD_EXPECTED_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            test "${X2MD_RELEASE_REF#v}" = "$X2MD_EXPECTED_VERSION"
          fi
          export X2MD_EXPECTED_VERSION
          npm run smoke:mac
          npm run smoke:mac:startup-time
          npm run smoke:mac:port-conflict
          npm run smoke:mac:autostart
          npm run smoke:mac:login-autostart
          npm run smoke:mac:first-run
          npm run smoke:mac:extension-health
          npm run smoke:chrome-extension-load
          npm run smoke:mac:window-visible
          npm run smoke:mac:menu-visible

      - name: 上传 Mac 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: X2MD_Mac
          path: X2MD_Mac.zip
          retention-days: 30

  package-extension:
    needs: release-gate
    runs-on: ubuntu-latest
    name: 打包 Chrome 扩展
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 同步扩展版本
        run: node scripts/sync-extension-version.mjs

      - name: 压缩浏览器扩展
        run: |
          cd extension
          zip -r ../X2MD_Extension.zip . -x "tests/*" "tests/**"

      - name: 验证扩展压缩包
        run: |
          unzip -q X2MD_Extension.zip -d /tmp/x2md-extension
          test -f /tmp/x2md-extension/manifest.json
          test -f /tmp/x2md-extension/background.js
          test -f /tmp/x2md-extension/save_response.js

      - name: 上传扩展压缩包
        uses: actions/upload-artifact@v4
        with:
          name: X2MD_Extension
          path: X2MD_Extension.zip
          retention-days: 30

  build-windows-beta:
    needs: release-gate
    runs-on: windows-latest
    name: 构建 Windows TypeScript Beta
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'
      - run: npm ci
      - run: node scripts/build-windows-beta.mjs --output artifacts/windows-beta
      - run: node scripts/smoke-windows-beta.mjs --artifact artifacts/windows-beta/X2MD_Windows_Beta
      - uses: actions/upload-artifact@v4
        with:
          name: X2MD_Windows_Beta
          path: artifacts/windows-beta/X2MD_Windows_Beta.zip
          retention-days: 30

  release:
    needs: [build-mac, package-extension, build-windows-beta]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: 创建 Release
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: 生成 SHA256 校验文件
        run: sha256sum X2MD_Mac.zip X2MD_Extension.zip X2MD_Windows_Beta.zip > SHA256SUMS.txt

      - name: 校验最终下载产物
        run: |
          node scripts/check-release-artifacts.mjs --mac-zip X2MD_Mac.zip
          unzip -q X2MD_Extension.zip -d /tmp/x2md-extension-final
          test -f /tmp/x2md-extension-final/manifest.json
          sha256sum -c SHA256SUMS.txt

      - name: 准备 Release Notes
        run: |
          NOTES="release/${{ github.ref_name }}/RELEASE_NOTES.md"
          if [ -f "$NOTES" ]; then
            cp "$NOTES" RELEASE_NOTES.md
          else
            printf "X2MD %s\n\n- Mac：Electrobun stable 版\n- Chrome 扩展包\n" "${{ github.ref_name }}" > RELEASE_NOTES.md
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: X2MD ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            X2MD_Mac.zip
            X2MD_Extension.zip
            X2MD_Windows_Beta.zip
            SHA256SUMS.txt
          draft: false
          prerelease: false
