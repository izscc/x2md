name: 构建跨平台安装包

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 2.0.0）'
        required: false
        default: '2.0.0-lite'
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    name: 测试
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: npm ci

      - name: 类型检查和测试
        run: npm run check

  build-mac:
    needs: test
    runs-on: macos-latest
    name: 打包 Mac Electrobun 版
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2

      - name: 安装依赖
        run: bun install

      - name: Electrobun 打包
        run: bun run build:mac

      - name: 打包产物冒烟测试
        run: npm run smoke:mac

      - name: 启动耗时冒烟测试
        run: npm run smoke:mac:startup-time

      - name: 扩展兼容冒烟测试
        run: npm run smoke:mac:extension-health

      - name: 压缩 Mac .app
        run: |
          APP_PATH="build/stable-macos-arm64/X2MD.app"
          test -n "$APP_PATH"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" X2MD_Mac.zip

      - name: 上传 Mac 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: X2MD_Mac
          path: X2MD_Mac.zip
          retention-days: 30

  build-windows-legacy:
    needs: test
    runs-on: windows-latest
    name: 打包 Windows Legacy 版
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 生成 Windows 图标
        run: |
          python -c "from PIL import Image; img = Image.open('assets/icon.png'); img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: PyInstaller 打包
        run: pyinstaller x2md.spec --clean --noconfirm

      - name: 压缩 Windows 文件夹
        run: Compress-Archive -Path dist\X2MD\* -DestinationPath X2MD_Windows.zip

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: X2MD_Windows
          path: X2MD_Windows.zip
          retention-days: 30

  package-extension:
    needs: test
    runs-on: ubuntu-latest
    name: 打包 Chrome 扩展
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 同步扩展版本
        run: node scripts/sync-extension-version.mjs

      - name: 压缩浏览器扩展
        run: |
          cd extension
          zip -r ../X2MD_Extension.zip . -x "tests/*" "tests/**"

      - name: 验证扩展压缩包
        run: |
          unzip -q X2MD_Extension.zip -d /tmp/x2md-extension
          test -f /tmp/x2md-extension/manifest.json
          test -f /tmp/x2md-extension/background.js
          test -f /tmp/x2md-extension/save_response.js

      - name: 上传扩展压缩包
        uses: actions/upload-artifact@v4
        with:
          name: X2MD_Extension
          path: X2MD_Extension.zip
          retention-days: 30

  release:
    needs: [build-mac, build-windows-legacy, package-extension]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: 创建 Release
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: 生成 SHA256 校验文件
        run: sha256sum X2MD_Mac.zip X2MD_Windows.zip X2MD_Extension.zip > SHA256SUMS.txt

      - name: 准备 Release Notes
        run: |
          NOTES="release/${{ github.ref_name }}/RELEASE_NOTES.md"
          if [ -f "$NOTES" ]; then
            cp "$NOTES" RELEASE_NOTES.md
          else
            printf "X2MD %s\n\n- Mac：Electrobun 版\n- Windows：迁移期 legacy 版\n- Chrome 扩展包\n" "${{ github.ref_name }}" > RELEASE_NOTES.md
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: X2MD ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            X2MD_Mac.zip
            X2MD_Windows.zip
            X2MD_Extension.zip
            SHA256SUMS.txt
          draft: false
          prerelease: false
