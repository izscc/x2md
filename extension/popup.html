<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X2MD</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --surface: rgba(255,255,255,.88);
      --surface-strong: #fff;
      --border: rgba(60,60,67,.14);
      --text: #1d1d1f;
      --muted: rgba(60,60,67,.72);
      --accent: #007aff;
      --accent-soft: rgba(0,122,255,.10);
      --green: #34c759;
      --red: #ff3b30;
      --radius: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { width: 336px; margin: 0; padding: 12px; color: var(--text); background: radial-gradient(circle at 0 0, rgba(0,122,255,.12), transparent 42%), var(--bg); font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", sans-serif; }
    .surface { background: var(--surface); border: 1px solid var(--border); box-shadow: 0 10px 28px rgba(0,0,0,.08); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); }
    .header { display: flex; align-items: center; gap: 11px; padding: 6px 4px 14px; }
    .brand-mark { width: 38px; height: 38px; border-radius: 11px; box-shadow: 0 5px 14px rgba(0,122,255,.2); }
    .header-copy { min-width: 0; flex: 1; }
    .header-title { font-size: 18px; line-height: 1.1; font-weight: 750; letter-spacing: -.03em; }
    .header-sub { margin-top: 2px; color: var(--muted); font-size: 11px; }
    .status { display: flex; align-items: center; gap: 9px; padding: 12px; border-radius: var(--radius); }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; background: var(--red); box-shadow: 0 0 0 4px rgba(255,59,48,.14); }
    .dot.online { background: var(--green); box-shadow: 0 0 0 4px rgba(52,199,89,.16); }
    .status-copy { min-width: 0; }
    .status-text { font-weight: 700; }
    .status-hint { overflow: hidden; margin-top: 1px; color: var(--muted); font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .body { display: grid; gap: 14px; padding: 14px 0; }
    .section-title { margin: 0 4px 7px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .04em; }
    .list { display: grid; gap: 7px; }
    .item { min-width: 0; padding: 10px 11px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface-strong); color: var(--muted); }
    .item-path { overflow: hidden; color: var(--text); font-size: 12px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
    .item-meta { margin-top: 2px; overflow: hidden; color: var(--muted); font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .item.error { color: var(--red); }
    .footer { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .btn { display: flex; align-items: center; justify-content: center; min-height: 40px; border: 1px solid rgba(0,122,255,.3); border-radius: 13px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; text-decoration: none; box-shadow: 0 7px 16px rgba(0,122,255,.22); transition: transform 150ms ease, background-color 150ms ease; }
    .btn:hover { background: #006ee6; }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 3px solid rgba(0,122,255,.28); outline-offset: 2px; }
  </style>
</head>
<body>
  <header class="header">
    <img class="brand-mark" src="icons/icon48.png" alt="X2MD" />
    <div class="header-copy"><div class="header-title">X2MD</div><div class="header-sub">将网页安静地存入 Obsidian</div></div>
  </header>

  <section class="status surface" aria-live="polite">
    <div class="dot" id="dot" aria-hidden="true"></div>
    <div class="status-copy"><div class="status-text" id="status-text">检测本机服务…</div><div class="status-hint" id="status-hint">本机固定服务</div></div>
  </section>

  <main class="body">
    <section aria-labelledby="path-title"><h2 class="section-title" id="path-title">保存位置</h2><div class="list" id="path-list"><div class="item">加载中…</div></div></section>
    <section aria-labelledby="history-title"><h2 class="section-title" id="history-title">最近保存</h2><div class="list" id="history-list"><div class="item">加载中…</div></div></section>
  </main>

  <footer class="footer"><a class="btn" href="options.html" target="_blank">打开设置</a></footer>
  <script src="popup.js"></script>
</body>
</html>
