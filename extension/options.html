<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X2MD 连接</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17171a; background: #f5f5f7; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 28px; background: radial-gradient(circle at top, #eaf4ff, #f5f5f7 42%); }
    main { width: min(680px, 100%); display: grid; gap: 16px; }
    .card { padding: 24px; border: 1px solid rgba(60,60,67,.14); border-radius: 22px; background: rgba(255,255,255,.9); box-shadow: 0 18px 48px rgba(15,23,42,.08); }
    .brand { display: flex; gap: 14px; align-items: center; }
    .brand img { width: 58px; height: 58px; border-radius: 17px; }
    h1, h2, p { margin: 0; }
    h1 { font-size: 27px; letter-spacing: -.04em; }
    h2 { font-size: 18px; margin-bottom: 8px; }
    .muted, #statusDetail { color: #68686f; }
    .status-row { display: flex; gap: 12px; align-items: flex-start; }
    .dot { width: 11px; height: 11px; margin-top: 6px; border-radius: 50%; background: #8e8e93; box-shadow: 0 0 0 4px rgba(142,142,147,.14); flex: none; }
    .dot.connected { background: #30b856; box-shadow: 0 0 0 4px rgba(48,184,86,.14); }
    .dot.offline, .dot.incompatible { background: #e7443e; box-shadow: 0 0 0 4px rgba(231,68,62,.14); }
    .dot.pairing { background: #ef9b24; box-shadow: 0 0 0 4px rgba(239,155,36,.14); }
    .versions { margin-top: 16px; display: flex; gap: 20px; color: #68686f; font-size: 13px; }
    .versions strong { color: #17171a; }
    .pairing { margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(60,60,67,.12); }
    .pairing[hidden] { display: none; }
    .input-row, .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    input { flex: 1 1 220px; min-height: 42px; border: 1px solid rgba(60,60,67,.24); border-radius: 12px; padding: 0 13px; font: inherit; letter-spacing: .12em; }
    button, a.button { min-height: 42px; border: 0; border-radius: 12px; padding: 0 15px; display: inline-flex; align-items: center; justify-content: center; font: 700 14px/1 inherit; cursor: pointer; text-decoration: none; }
    .primary { background: #0a84ff; color: white; }
    .secondary { background: #ececf0; color: #17171a; }
    button:disabled { opacity: .48; cursor: not-allowed; }
    #feedback { min-height: 20px; margin-top: 10px; color: #68686f; font-size: 13px; }
    #feedback.error { color: #c9342f; }
    @media (max-width: 520px) { body { padding: 14px; } .card { padding: 20px; } .actions > * { width: 100%; } }
  </style>
</head>
<body>
  <main>
    <section class="card brand">
      <img src="icons/icon128.png" alt="X2MD" />
      <div><h1>X2MD 扩展连接</h1><p class="muted">内容规则由桌面 App 统一管理。</p></div>
    </section>

    <section class="card" aria-live="polite">
      <div class="status-row">
        <span id="statusDot" class="dot"></span>
        <div><h2 id="statusTitle">正在检查连接…</h2><p id="statusDetail">正在连接 127.0.0.1:9527</p></div>
      </div>
      <div class="versions">
        <span>扩展版本 <strong id="extensionVersion">-</strong></span>
        <span>App 版本 <strong id="appVersion">-</strong></span>
      </div>

      <div id="pairingPanel" class="pairing" hidden>
        <h2>与桌面 App 配对</h2>
        <p class="muted">打开 X2MD App 设置，输入其中显示的一次性配对码。</p>
        <div class="input-row">
          <input id="pairingCode" inputmode="numeric" autocomplete="one-time-code" aria-label="配对码" placeholder="输入配对码" />
          <button id="pairButton" class="primary" type="button">配对</button>
        </div>
      </div>
      <p id="feedback"></p>
    </section>

    <section class="card">
      <h2>连接工具</h2>
      <p class="muted">业务配置仅在桌面 App 中修改。</p>
      <div class="actions">
        <button id="openSettings" class="primary" type="button" disabled>打开桌面设置</button>
        <button id="refresh" class="secondary" type="button">检查连接</button>
        <a id="diagnostics" class="button secondary" href="https://github.com/izscc/x2md#常见问题" target="_blank" rel="noreferrer">打开诊断文档</a>
      </div>
    </section>
  </main>
  <script src="local_client.js"></script>
  <script src="options.js"></script>
</body>
</html>
