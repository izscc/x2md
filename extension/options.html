<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>X2MD 设置</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0f1117;
            --surface: #16181c;
            --surface2: #1e2028;
            --border: #2f3336;
            --accent: #1d9bf0;
            --accent-hover: #1a8cd8;
            --text: #e7e9ea;
            --text-muted: #71767b;
            --danger: #f4212e;
            --success: #00ba7c;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 32px 16px;
        }

        .page {
            width: 100%;
            max-width: 700px;
        }

        /* 顶部标题栏 */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .top-bar-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1d9bf0, #0d6efd);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .top-bar h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .top-bar p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 服务状态卡片 */
        .status-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background .3s;
        }

        .status-indicator.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-indicator.offline {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .status-info {
            flex: 1;
        }

        .status-info strong {
            font-size: 14px;
        }

        .status-info span {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }

        .btn-refresh {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-refresh:hover {
            background: #1d9bf015;
        }

        /* 卡片通用 */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header-icon {
            font-size: 18px;
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .card-header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .card-body {
            padding: 16px 20px;
        }

        /* 路径列表 */
        .path-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .path-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            animation: fadeIn .2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .path-row-icon {
            font-size: 15px;
            flex-shrink: 0;
        }

        .path-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', monospace;
        }

        .path-row input::placeholder {
            color: var(--text-muted);
        }

        .btn-remove {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1;
            transition: color .15s;
            flex-shrink: 0;
        }

        .btn-remove:hover {
            color: var(--danger);
        }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            transition: all .15s;
        }

        .btn-add:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 通用表单行 */
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-muted);
            flex-shrink: 0;
            width: 100px;
        }

        .form-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
            font-family: monospace;
            outline: none;
            transition: border-color .15s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.5;
        }

        /* 保存按钮 */
        .btn-save {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 24px;
            cursor: pointer;
            margin-top: 4px;
            transition: background .15s, transform .1s;
        }

        .btn-save:hover {
            background: var(--accent-hover);
        }

        .btn-save:active {
            transform: scale(0.97);
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0, 186, 124, .4);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            z-index: 9999;
        }

        #toast.show {
            opacity: 1;
        }

        #toast.error {
            background: var(--danger);
            box-shadow: 0 4px 16px rgba(244, 33, 46, .4);
        }

        /* 文件命名占位说明 */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 11px;
            font-family: monospace;
            color: var(--accent);
        }

        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }
    </style>
</head>

<body>
    <div class="page">
        <!-- 标题 -->
        <div class="top-bar">
            <div class="top-bar-icon">🔖</div>
            <div>
                <h1>X2MD 设置</h1>
                <p>配置推特书签 → Obsidian Markdown 保存规则</p>
            </div>
        </div>

        <!-- 服务状态 -->
        <div class="status-card">
            <div class="status-indicator offline" id="statusDot"></div>
            <div class="status-info">
                <strong id="statusText">检测本地服务…</strong>
                <span id="statusSub">正在连接 localhost:<span id="portLabel">9527</span></span>
            </div>
            <button class="btn-refresh" id="btnRefresh">刷新</button>
        </div>

        <!-- 保存路径 -->
        <div class="card">
            <div class="card-header">
                <div class="card-header-icon">📁</div>
                <div>
                    <h2>保存路径</h2>
                    <p>支持添加多个路径，保存时同步写入所有路径</p>
                </div>
            </div>
            <div class="card-body">
                <div class="path-list" id="pathList"></div>
                <button class="btn-add" id="btnAdd">
                    <span>＋</span> 添加保存路径
                </button>
            </div>
        </div>

        <!-- 服务设置 -->
        <div class="card">
            <div class="card-header">
                <div class="card-header-icon">⚙️</div>
                <div>
                    <h2>服务设置</h2>
                    <p>本地服务器和文件命名规则</p>
                </div>
            </div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-label">服务端口</div>
                    <input class="form-input" type="number" id="portInput" placeholder="9527" min="1024" max="65535" />
                </div>
                <div class="section-divider"></div>
                <div class="form-row">
                    <div class="form-label">文件命名</div>
                    <div style="flex:1">
                        <input class="form-input" type="text" id="filenameFormat"
                            placeholder="{date}_{author}_{summary}" style="width:100%" />
                        <div class="form-hint">支持的变量：</div>
                        <div class="tag-group">
                            <span class="tag">{date}</span>
                            <span class="tag">{author}</span>
                            <span class="tag">{handle}</span>
                            <span class="tag">{summary}</span>
                            <span class="tag">{timestamp}</span>
                        </div>
                    </div>
                </div>
                <div class="section-divider"></div>
                <div class="form-row">
                    <div class="form-label">文件名限长</div>
                    <input class="form-input" type="number" id="maxLen" placeholder="60" min="20" max="200" />
                </div>
            </div>
        </div>

        <!-- 媒体下载设置 -->
        <div class="card">
            <div class="card-header">
                <div class="card-header-icon">🎞️</div>
                <div>
                    <h2>媒体下载设置</h2>
                    <p>管理推文视频的大文件直接下载与警告参数</p>
                </div>
            </div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-label">视频自动下载</div>
                    <div style="flex:1; display:flex; align-items:center;">
                        <input type="checkbox" id="enableVideoDownload" style="width:16px; height:16px; cursor:pointer;"
                            checked />
                        <label for="enableVideoDownload"
                            style="margin-left: 8px; font-size:13px; cursor:pointer;">开启该功能后，视频会被自动下载到下方路径</label>
                    </div>
                </div>
                <div class="section-divider"></div>
                <div class="form-row">
                    <div class="form-label">视频保存路径</div>
                    <input class="form-input" type="text" id="videoSavePath" placeholder="/Users/.../视频/2026" />
                </div>
                <div class="section-divider"></div>
                <div class="form-row">
                    <div class="form-label">警告阈值(分钟)</div>
                    <div style="flex:1">
                        <input class="form-input" type="number" id="videoDurationThreshold" placeholder="5" min="1"
                            max="60" style="width: 100px;" />
                        <div class="form-hint">当推特视频时长超过此分钟数时，将弹窗向您确认是否仍然下载文件。</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 保存按钮 -->
        <button class="btn-save" id="btnSave">
            <span>💾</span> 保存设置
        </button>
    </div>

    <div id="toast"></div>

    <script src="options.js"></script>
</body>

</html>
